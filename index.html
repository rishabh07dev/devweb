<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Holi — 12A2 Batch 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #FF2D78;
      --yellow: #FFD600;
      --cyan:   #00E5FF;
      --green:  #69FF47;
      --orange: #FF6D00;
      --purple: #CC00FF;
      --blue:   #2979FF;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #06000f;
      font-family: 'Rajdhani', sans-serif;
    }

    canvas#bg { position: fixed; inset: 0; z-index: 0; }

    /* main stage container */
    .stage {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh;
    }

    /* animated gradient text effect */
    .holi-title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(5rem, 15vw, 13rem);
      line-height: .9;
      letter-spacing: .06em;
      text-align: center;
      background: linear-gradient(135deg,
        var(--pink) 0%,
        var(--yellow) 25%,
        var(--cyan) 50%,
        var(--green) 75%,
        var(--purple) 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 4s ease infinite, titlePop .8s cubic-bezier(.34,1.56,.64,1) both;
      filter: drop-shadow(0 0 40px rgba(255,45,120,.6)) drop-shadow(0 0 80px rgba(0,229,255,.3));
    }

    /* cyan glowing batch code */
    .batch-code {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(3.5rem, 10vw, 9rem);
      letter-spacing: .12em;
      text-align: center;
      color: #fff;
      text-shadow:
        0 0 20px var(--cyan),
        0 0 60px var(--cyan),
        0 0 120px var(--blue);
      animation: batchPop .9s .2s cubic-bezier(.34,1.56,.64,1) both, glowPulse 2.5s 1s ease-in-out infinite;
      position: relative;
    }

    .batch-code::after {
      content: '12A2';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--cyan), var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(18px);
      opacity: .7;
      animation: gradShift 3s ease infinite;
    }

    /* uppercase year display */
    .year-line {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: clamp(1rem, 3vw, 2rem);
      letter-spacing: .4em;
      text-transform: uppercase;
      color: rgba(255,255,255,.55);
      animation: fadeUp .8s .6s ease both;
      margin-top: .2em;
    }

    /* colorful gradient divider line */
    .divider {
      width: clamp(180px, 40vw, 420px);
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--pink), var(--yellow), var(--cyan), transparent);
      margin: 1.2rem 0;
      animation: fadeUp .8s .5s ease both;
      border-radius: 99px;
    }

    /* subtle text with letter spacing */
    .tagline {
      font-size: clamp(.95rem, 2.2vw, 1.4rem);
      letter-spacing: .22em;
      color: rgba(255,255,255,.45);
      text-transform: uppercase;
      animation: fadeUp .8s .75s ease both;
    }

    /* floating color smoke blobs */
    .blobs {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0;
      animation: blobFloat linear infinite;
    }

    /* gradient animation for shifting colors */
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* pop-in animation for title */
    @keyframes titlePop {
      from { opacity: 0; transform: scale(.6) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    /* pop-in animation for batch */
    @keyframes batchPop {
      from { opacity: 0; transform: scale(.5) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    /* cyan to purple glow pulse */
    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 20px var(--cyan), 0 0 60px var(--cyan), 0 0 120px var(--blue); }
      50%       { text-shadow: 0 0 40px var(--purple), 0 0 100px var(--purple), 0 0 160px var(--pink); }
    }
    /* fade and slide up animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* blob rising with opacity curve */
    @keyframes blobFloat {
      0%   { transform: translate(0, 110vh) scale(.8); opacity: 0; }
      10%  { opacity: .55; }
      90%  { opacity: .55; }
      100% { transform: translate(var(--dx), -20vh) scale(1.3); opacity: 0; }
    }

    /* bottom right badge text */
    .badge {
      position: fixed;
      bottom: 1.5rem; right: 1.8rem;
      font-family: 'Orbitron', monospace;
      font-size: .7rem;
      letter-spacing: .2em;
      color: rgba(255,255,255,.2);
      text-transform: uppercase;
      z-index: 20;
    }

    /* bottom left interaction hint */
    .hint {
      position: fixed;
      bottom: 1.5rem; left: 1.8rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: .75rem;
      letter-spacing: .15em;
      color: rgba(255,255,255,.18);
      text-transform: uppercase;
      z-index: 20;
      animation: fadeUp 1s 1.5s ease both;
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="blobs" id="blobs"></div>

<div class="stage">
  <div class="holi-title">Happy<br>Holi</div>
  <div class="divider"></div>
  <div class="batch-code">12A2</div>
  <div class="year-line">Batch &nbsp;·&nbsp; 2026</div>
  <div style="height:.8rem"></div>
  <div class="tagline">Colors &nbsp;·&nbsp; Vibes &nbsp;·&nbsp; Squad</div>
</div>

<div class="badge">12A2 · Holi 2026</div>
<div class="hint">Click anywhere for colors ✦</div>

<script>
  /* canvas powder particle system */
  const canvas = document.getElementById('bg');
  const ctx    = canvas.getContext('2d');

  /* resize canvas to window */
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* color palette for particles */
  const COLORS = ['#FF2D78','#FFD600','#00E5FF','#69FF47','#FF6D00','#CC00FF','#2979FF','#FF80AB','#EEFF41'];
  const PARTICLES = [];
  const MAX = 260;

  class Particle {
    constructor() { this.reset(true); }
    /* initialize or recycle particle */
    reset(init = false) {
      this.x     = Math.random() * canvas.width;
      this.y     = init ? Math.random() * canvas.height : canvas.height + Math.random() * 200;
      this.r     = Math.random() * 7 + 2;
      this.vx    = (Math.random() - .5) * 1.4;
      this.vy    = -(Math.random() * 2.5 + .8);
      this.alpha = Math.random() * .7 + .3;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.spin  = (Math.random() - .5) * .08;
      this.angle = Math.random() * Math.PI * 2;
      this.shape = Math.random() > .5 ? 'circle' : 'star';
      this.decay = Math.random() * .004 + .001;
      this.life  = 1;
    }
    /* update position velocity and decay */
    update() {
      this.x     += this.vx;
      this.y     += this.vy;
      this.angle += this.spin;
      this.life  -= this.decay;
      this.vy    += .008;
      this.vx    += (Math.random() - .5) * .05;
      if (this.life <= 0) this.reset();
    }
    /* render circle or star */
    draw() {
      ctx.save();
      ctx.globalAlpha = this.alpha * this.life;
      ctx.fillStyle   = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur  = 14;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      if (this.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fill();
      } else {
        /* draw 8-pointed star shape */
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a   = (i / 8) * Math.PI * 2;
          const rad = i % 2 === 0 ? this.r : this.r * .4;
          i === 0
            ? ctx.moveTo(Math.cos(a) * rad, Math.sin(a) * rad)
            : ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
        }
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }
  }

  /* initialize particle pool */
  for (let i = 0; i < MAX; i++) PARTICLES.push(new Particle());

  /* main animation loop */
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    PARTICLES.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();

  /* color smoke blobs rising */
  const blobsEl    = document.getElementById('blobs');
  const blobColors = ['#FF2D78','#FFD600','#00E5FF','#69FF47','#FF6D00','#CC00FF'];

  /* create and style blob elements */
  for (let i = 0; i < 14; i++) {
    const b    = document.createElement('div');
    b.className = 'blob';
    const size = Math.random() * 200 + 120;
    const col  = blobColors[Math.floor(Math.random() * blobColors.length)];
    const dur  = Math.random() * 12 + 10;
    const del  = Math.random() * 15;
    const startX = Math.random() * 100;
    const dx   = (Math.random() - .5) * 30;
    b.style.cssText = `
      width:${size}px; height:${size}px;
      background:${col};
      left:${startX}vw;
      --dx:${dx}vw;
      animation-duration:${dur}s;
      animation-delay:-${del}s;
    `;
    blobsEl.appendChild(b);
  }

  /* burst particles on mouse click */
  window.addEventListener('click', (e) => {
    for (let i = 0; i < 35; i++) {
      const p  = new Particle();
      p.x      = e.clientX;
      p.y      = e.clientY;
      p.vx     = (Math.random() - .5) * 10;
      p.vy     = (Math.random() - .5) * 10;
      p.r      = Math.random() * 10 + 4;
      p.life   = 1;
      p.decay  = Math.random() * .01 + .005;
      PARTICLES.push(p);
    }
    if (PARTICLES.length > MAX + 300) PARTICLES.splice(0, 35);
  });
</script>
</body>
</html>
